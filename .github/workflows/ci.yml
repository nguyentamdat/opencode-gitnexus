# CI Pipeline - following omo project patterns
# Parallel jobs for faster feedback, strict version pinning

name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bun run check

  test:
    runs-on: ubuntu-latest
    needs: typecheck
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun test

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          if-no-files-found: ignore

  build:
    runs-on: ubuntu-latest
    needs: [typecheck, test]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Verify exports
        run: |
          timeout 5 node --input-type=module -e "
            import mod from './dist/index.js';
            console.log('✓ Default export:', typeof mod);
            process.exit(0);
          " || exit 1

      - name: Test Node import doesn't hang
        run: |
          timeout 3 node --input-type=module -e "
            import('./dist/index.js').then(() => process.exit(0));
          "
          echo "✓ Module imports without hanging"

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  lint-workflows:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint workflows
        uses: rlespinasse/github-slug-action@v4
        with:
          slug-maxlength: 40

      - name: Check workflow syntax
        run: |
          # Install actionlint if needed
          if ! command -v actionlint &> /dev/null; then
            echo "actionlint not installed, skipping detailed lint"
          else
            actionlint .github/workflows/*.yml
          fi
