name: PR Checks

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Type check
        run: bun run check

      - name: Run tests with coverage
        run: bun test

      - name: Build
        run: bun run build

      - name: Check dist files exist
        run: |
          test -f dist/index.js || exit 1
          test -f dist/index.d.ts || exit 1
          echo "✓ Distribution files present"

      - name: Verify no hanging imports
        run: |
          timeout 5 node --input-type=module -e "
            import('./dist/index.js').then(() => {
              console.log('✓ Module loads without hanging');
              process.exit(0);
            });
          " || exit 1

  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check commit messages
        uses: wagoid/commitlint-github-action@v5
        with:
          configFile: ./.commitlintrc.json
        continue-on-error: true

      - name: Check package.json
        run: |
          # Ensure required fields exist
          grep -q '"name"' package.json || exit 1
          grep -q '"version"' package.json || exit 1
          grep -q '"main"' package.json || exit 1
          grep -q '"types"' package.json || exit 1
          echo "✓ package.json has required fields"

      - name: Check release notes exist for new version
        run: |
          VERSION=$(grep '"version"' package.json | head -1 | sed 's/.*: "\(.*\)".*/\1/')
          if [ ! -f "RELEASE_NOTES_v${VERSION}.md" ]; then
            echo "⚠ Warning: No release notes found for v${VERSION}"
          else
            echo "✓ Release notes found for v${VERSION}"
          fi
        continue-on-error: true
